  <script>
  // Load shared navbar (injects navbar.html body and executes its scripts)
  async function includeNavbar() {
    try {
      const res = await fetch('navbar.html');
      const text = await res.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(text, 'text/html');
      document.getElementById('navbar-container').innerHTML = doc.body.innerHTML;

      // Execute scripts from navbar.html and wait for external scripts to load
      const __createdScriptPromises = [];
      doc.querySelectorAll('script').forEach(s => {
        const newScript = document.createElement('script');
        if (s.src) {
          newScript.src = s.src;
          newScript.async = false;
          __createdScriptPromises.push(new Promise(resolve => {
            newScript.addEventListener('load', resolve);
            newScript.addEventListener('error', resolve);
            setTimeout(resolve, 2000);
          }));
        } else {
          newScript.textContent = s.textContent;
        }
        document.body.appendChild(newScript);
      });
      Promise.all(__createdScriptPromises).finally(() => {});

      // Ensure navbar init functions run after dynamic injection (wait for external scripts to load)
      const __navbarScriptPromises = [];
      doc.querySelectorAll('script').forEach((s, i) => {
        const existing = document.querySelectorAll('script')[document.querySelectorAll('script').length - 1 - i];
        if (existing && existing.src) {
          __navbarScriptPromises.push(new Promise(resolve => {
            existing.addEventListener('load', resolve);
            existing.addEventListener('error', resolve);
            setTimeout(resolve, 2000);
          }));
        }
      });
      Promise.all(__navbarScriptPromises).finally(() => {
        if (typeof checkScreenSize === 'function') checkScreenSize();
        if (typeof addDesktopHoverEffects === 'function') addDesktopHoverEffects();
        if (typeof updateUserUI === 'function') updateUserUI();
        if (typeof updateCartBadge === 'function') updateCartBadge();
        if (typeof setActiveNavLink === 'function') setActiveNavLink();
      });
    } catch (e) {
      console.error('Failed to load navbar:', e);
    }
  }
  includeNavbar();
</script>

<script>
  const API_BASE = 'https://buildmarts.in/api';
  const wishlistKey = 'productWishlist';

  function getSelectedId(){
    const qp = new URLSearchParams(location.search).get('id');
    return qp || localStorage.getItem('selectedProductId');
  }

  async function fetchProduct(id){
    try{
      const res = await fetch(API_BASE + '/product_uploads/' + id);
      const json = await res.json();
      if(!json.success) throw new Error(json.error||'Not found');
      return json.product;
    }catch(err){ throw err; }
  }

  function renderStars(rating){
    if(!rating) return '';
    const full = Math.floor(rating);
    const half = rating - full >= 0.5;
    let out = '';
    for(let i=0;i<5;i++){
      if(i<full) out += '★';
      else if(i===full && half) out += '½';
      else out += '☆';
    }
    return out;
  }

  function updateWishlistBtn(id){
    const arr = JSON.parse(localStorage.getItem(wishlistKey)||'[]');
    const btn = document.getElementById('wish-'+id);
    if(!btn) return;
    if(arr.includes(Number(id))){ btn.textContent='❤️'; btn.classList.add('active'); }
    else { btn.textContent='🤍'; btn.classList.remove('active'); }
  }

  function toggleWishlist(id, name){
    const arr = JSON.parse(localStorage.getItem(wishlistKey)||'[]');
    const idx = arr.indexOf(Number(id));
    if(idx>-1){ arr.splice(idx,1); showInline('info', name + ' removed from wishlist'); }
    else { arr.push(Number(id)); showInline('success', name + ' added to wishlist ❤️'); }
    localStorage.setItem(wishlistKey, JSON.stringify(arr));
    updateWishlistBtn(id);
    try{ if(window.opener && typeof window.opener.updateWishlistButtons === 'function') window.opener.updateWishlistButtons(); }catch(e){}
  }

  async function addToCart(id, name, price, image){
    try{
      let cartKey = localStorage.getItem('cart_key');
      if(!cartKey){ cartKey = 'cart_' + Date.now() + '_' + Math.random().toString(36).slice(2,9); localStorage.setItem('cart_key', cartKey); }
      const res = await fetch(API_BASE + '/cart/add', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ cart_key: cartKey, product_id: id, name, price, image, qty:1 })
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error || 'Add to cart failed');
      const t = document.getElementById('toast'); t.style.display='block'; setTimeout(()=>{ t.style.opacity=1; },10);
      setTimeout(()=>{ t.style.opacity=0; setTimeout(()=>t.style.display='none',260); },2000);
      showInline('success','Added to cart','✅ ' + name);
      if(typeof updateCartBadge === 'function') updateCartBadge();
    }catch(err){ showInline('error','Failed',err.message); }
  }

  function buyNow(){ document.getElementById('buyModal').style.display='flex'; }
  function closeModal(id){ document.getElementById(id).style.display='none'; }

  async function submitOrder(){
    const form = document.getElementById('buyForm');
    const data = { name: form.name.value, phone: form.phone.value, qty: form.qty.value, address: form.address.value, productId: getSelectedId() };
    alert('Order placed ✔\n' + JSON.stringify(data,null,2));
    closeModal('buyModal');
  }

  function showInline(type, title, message){
    const n = document.createElement('div');
    n.style.cssText = 'position:fixed;top:20px;right:20px;background:#3498db;color:#fff;padding:12px 16px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,0.2);z-index:1300';
    n.innerHTML = '<strong>'+title+'</strong><div style="font-size:13px;margin-top:6px">'+(message||'')+'</div>';
    document.body.appendChild(n);
    setTimeout(()=>n.remove(),3200);
  }

  async function initSingle(){
    const id = getSelectedId();
    if(!id){ document.getElementById('singleArea').innerHTML = '<div style="padding:40px;background:#fff;border-radius:12px;text-align:center;color:#333;">No product selected. <a href="products.html" style="color:#667eea;">Return to products</a></div>'; return; }
    try{
      const product = await fetchProduct(id);
      const gallery = (product.imageUrls && product.imageUrls.length) ? product.imageUrls : (product.gallery && product.gallery.length) ? product.gallery : (product.imageUrl ? [product.imageUrl] : []);
      const galleryHtml = gallery.length ? `<div style="display:flex;gap:15px;flex-wrap:wrap;">${gallery.map((url, i) => `<div class="gallery-thumb" onclick="switchMainImage('${url.replace(/'/g, "\\'")}')"><img src="${url}" alt="thumb-${i}" style="width:100%;height:100%;object-fit:cover;"></div>`).join('')}</div>` : '';

      const specs = product.specs && typeof product.specs === 'object' ? Object.entries(product.specs) : [];
      const specsHtml = specs.length ? `<div style="background:#f8f9fa;border-radius:12px;padding:20px;margin:20px 0;border:1px solid #e9ecef;"><div style="font-size:20px;font-weight:800;color:#2c3e50;margin-bottom:15px;display:flex;align-items:center;gap:10px;">📋 Specifications</div><div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:15px;">${specs.map(([k,v]) => `<div style="background:white;padding:15px;border-radius:8px;border:1px solid #dee2e6;"><div style="font-size:12px;color:#6c757d;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;">${k}</div><div style="font-weight:700;color:#2c3e50;">${v}</div></div>`).join('')}</div></div>` : '';

      const tags = Array.isArray(product.tags) ? product.tags : (product.taglist ? product.taglist.split(',') : []);
      const tagsHtml = tags.length ? `<div style="margin:20px 0;">${tags.map(t => `<span style="display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:6px 12px;border-radius:15px;font-size:12px;font-weight:600;margin:5px 5px 0 0;">${t.trim()}</span>`).join('')}</div>` : '';

      const seller = product.seller || {};
      const sellerHtml = (seller.name || seller.phone || seller.email) ? `<div style="background:#f8f9fa;border-radius:12px;padding:20px;margin:20px 0;border:1px solid #e9ecef;"><div style="font-size:20px;font-weight:800;color:#2c3e50;margin-bottom:15px;display:flex;align-items:center;gap:10px;">🏪 Seller / Provider</div>${seller.name ? `<div style="font-weight:700;color:#2c3e50;margin-bottom:8px">${seller.name}</div>` : ''}${seller.phone ? `<div style="color:#6c757d;margin-bottom:4px">📞 ${seller.phone}</div>` : ''}${seller.email ? `<div style="color:#6c757d;margin-bottom:12px">✉️ ${seller.email}</div>` : ''}<div style="display:flex;gap:10px">${seller.phone ? `<button class="btn btn-outline" style="padding:15px 30px;border:none;border-radius:25px;font-weight:700;font-size:16px;cursor:pointer;transition:all 0.3s ease;display:inline-flex;align-items:center;gap:10px;text-decoration:none;min-width:140px;justify-content:center;background:transparent;color:#667eea;border:2px solid #667eea;" onclick="window.location='tel:${seller.phone}'">📞 Call</button>` : ''}${seller.email ? `<button class="btn btn-secondary" style="padding:15px 30px;border:none;border-radius:25px;font-weight:700;font-size:16px;cursor:pointer;transition:all 0.3s ease;display:inline-flex;align-items:center;gap:10px;text-decoration:none;min-width:140px;justify-content:center;background:linear-gradient(135deg,#f8f9fa,#e9ecef);color:#495057;border:2px solid #dee2e6;" onclick="window.location='mailto:${seller.email}'">✉️ Email</button>` : ''}</div></div>` : '';

      function formatKey(k){ return String(k).replace(/([A-Z])/g,' $1').replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }
      const excludeKeys = new Set(['id','productName','description','imageUrl','imagePath','imageUrls','gallery','finalPrice','price','discount','quantity','quantityUnit','rating','moq','warranty','created_at','updated_at','status','createdBy','seller_id','seller','tags','taglist','category','brand','dimensions','length','width','height','weight']);
      const detailEntries = Object.entries(product).filter(([k,v]) => !excludeKeys.has(k) && v != null && v !== '' && !(Array.isArray(v) && v.length === 0));

      const additionalDetails = `<div style="background:#f8f9fa;border-radius:12px;padding:20px;margin:20px 0;border:1px solid #e9ecef;"><div style="font-size:20px;font-weight:800;color:#2c3e50;margin-bottom:15px;display:flex;align-items:center;gap:10px;">📋Related  Product Information</div><div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:15px;">${product.material ? `<div style="background:white;padding:15px;border-radius:8px;border:1px solid #dee2e6;"><div class="spec-label" style="font-size:12px;color:#6c757d;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;">Material</div><div class="spec-value" style="font-weight:700;color:#2c3e50;">${product.material}</div></div>` : ''}${product.usage ? `<div style="background:white;padding:15px;border-radius:8px;border:1px solid #dee2e6;"><div style="font-size:12px;color:#6c757d;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;">Usage/Application</div><div style="font-weight:700;color:#2c3e50;">${product.usage}</div></div>` : ''}${product.certification ? `<div style="background:white;padding:15px;border-radius:8px;border:1px solid #dee2e6;"><div style="font-size:12px;color:#6c757d;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;">Certification</div><div style="font-weight:700;color:#2c3e50;">${product.certification}</div></div>` : ''}${product.grade ? `<div style="background:white;padding:15px;border-radius:8px;border:1px solid #dee2e6;"><div style="font-size:12px;color:#6c757d;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;">Grade/Quality</div><div style="font-weight:700;color:#2c3e50;">${product.grade}</div></div>` : ''}${product.origin ? `<div style="background:white;padding:15px;border-radius:8px;border:1px solid #dee2e6;"><div style="font-size:12px;color:#6c757d;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;">Origin/Country</div><div style="font-weight:700;color:#2c3e50;">${product.origin}</div></div>` :   function switchMainImage(url){
    const el = document.querySelector('#main-image img');
    if(el) el.src = url;
    // Hide zoom elements when switching images
    const lens = document.getElementById('zoom-lens');
    const preview = document.getElementById('zoom-preview');
    if(lens) lens.style.display = 'none';
    if(preview) preview.style.display = 'none';
  }

  function initZoom(){
    const img = document.querySelector('#main-image img');
    const lens = document.getElementById('zoom-lens');
    const preview = document.getElementById('zoom-preview');
    
    if (!img || !lens || !preview) return;
    
    const zoom = 3; // 3x magnification
    let isZooming = false;
    
    // Check if touch device (mobile)
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    
    if (isTouchDevice) {
      // For mobile: tap to toggle zoom (simplified)
      img.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (isZooming) {
          isZooming = false;
          lens.style.display = 'none';
          preview.style.display = 'none';
        } else {
          isZooming = true;
          lens.style.display = 'block';
          preview.style.display = 'block';
          preview.style.backgroundImage = `url(${img.src})`;
          preview.style.backgroundSize = `${img.naturalWidth * zoom}px ${img.naturalHeight * zoom}px`;
        }
      });
      
      img.addEventListener('touchmove', function(e) {
        if (!isZooming) return;
        e.preventDefault();
        const touch = e.touches[0];
        moveLens(touch);
      });
      
      img.addEventListener('touchend', function() {
        // Keep zoom active until tapped again
      });
    } else {
      // Desktop: hover zoom
      img.addEventListener('mouseenter', () => {
        isZooming = true;
        lens.style.display = 'block';
        preview.style.display = 'block';
        preview.style.backgroundImage = `url(${img.src})`;
        preview.style.backgroundSize = `${img.naturalWidth * zoom}px ${img.naturalHeight * zoom}px`;
      });
      
      img.addEventListener('mousemove', moveLens);
      
      img.addEventListener('mouseleave', () => {
        isZooming = false;
        lens.style.display = 'none';
        preview.style.display = 'none';
      });
    }
    
    function moveLens(e) {
      if (!isZooming) return;
      
      const rect = img.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const lensHalf = lens.offsetWidth / 2;
      let lensX = x - lensHalf;
      let lensY = y - lensHalf;
      
      // Constrain lens within image bounds
      lensX = Math.max(0, Math.min(lensX, rect.width - lens.offsetWidth));
      lensY = Math.max(0, Math.min(lensY, rect.height - lens.offsetHeight));
      
      lens.style.left = lensX + 'px';
      lens.style.top = lensY + 'px';
      
      // Calculate background position for preview (magnified view)
      const bgX = (lensX / rect.width) * 100;
      const bgY = (lensY / rect.height) * 100;
      preview.style.backgroundPosition = `${bgX}% ${bgY}%`;
    }
  }



  // fetch and render similar products based on category (exclude current id)
  async function loadSimilarProducts(category, currentId){
    try{
      const res = await fetch(API_BASE + '/product_uploads?category='+encodeURIComponent(category)+'&limit=8');
      const data = await res.json();
      if(data.success && Array.isArray(data.products)){
        const container = document.getElementById('similar-products');
        if(!container) return;
        const others = data.products.filter(p=>p.id!=currentId);
        if(others.length===0){ container.innerHTML = '<div style="color:#777;">No similar products found.</div>'; return; }
        container.innerHTML = others.map(similarProductCard).join('');
      }
    }catch(e){ console.error('similar products error', e); }
  }

  function similarProductCard(p){
    return `<div class="product-card" style="background:#e8f4f8;width:200px;cursor:pointer;" onclick="window.location='single-product.html?id=${p.id}'">
      <div class="product-image" style="height:140px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;overflow:hidden;">
        <img src="${p.imageUrl||''}" alt="${(p.productName||'').replace(/"/g,'&quot;')}" style="object-fit:cover;width:100%;height:100%;">
      </div>
      <div style="padding:10px;text-align:center;">
        <div style="font-size:14px;font-weight:600;color:#2c3e50;min-height:40px;">${p.productName||''}</div>
        <div style="margin-top:5px;font-size:16px;font-weight:700;color:#b12704;">₹${parseFloat(p.finalPrice||p.price||0).toFixed(2)}</div>
      </div>
    </div>`;
  }

  function copyLink(){
    const url = window.location.href;
    if(navigator.clipboard){ navigator.clipboard.writeText(url).then(()=> showInline('success','Link copied','Product link copied to clipboard')); }
    else { const ta = document.createElement('textarea'); ta.value=url; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); showInline('success','Link copied','Product link copied to clipboard'); }catch(e){ showInline('error','Copy failed','Unable to copy link'); } ta.remove(); }
  }

  initSingle();
</script>


<div id="footer-placeholder"></div>

<script>
  fetch('footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer-placeholder').innerHTML = data;
      // execute any scripts from the injected footer
      const temp = document.createElement('div');
      temp.innerHTML = data;
      temp.querySelectorAll('script').forEach(s => {
        const newScript = document.createElement('script');
        if (s.src) {
          newScript.src = s.src;
        } else {
          newScript.textContent = s.textContent;
        }
        document.body.appendChild(newScript);
      });
      // the injected script itself initializes subscription, no need to call again
      // (prevent duplicate listeners causing conflicting messages)
    })
    .catch(error => console.error('Footer load error:', error));
</script>

<!-- Load Chatbot -->
<script>
  async function loadChatbot() {
    try {
      const response = await fetch('./chatbot.html');
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      const htmlContent = await response.text();
      
      // Create a container to hold chatbot
      const container = document.createElement('div');
      container.id = 'chatbot-container';
      container.innerHTML = htmlContent;
      document.body.appendChild(container);
      
      // Extract and re-execute scripts from chatbot.html
      const scripts = container.querySelectorAll('script');
      scripts.forEach(oldScript => {
        const newScript = document.createElement('script');
        newScript.textContent = oldScript.textContent;
        document.head.appendChild(newScript);
      });
      
      console.log('✓ Chatbot loaded successfully');
    } catch (error) {
      console.error('✗ Chatbot load failed:', error);
    }
  }
  
  // Load chatbot when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadChatbot);
  } else {
    loadChatbot();
  }
</script>
