<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - Hitaishi Building Materials</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            box-sizing: border-box;
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .register-header h1 {
            margin: 0;
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .register-header p {
            margin: 0;
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .register-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .register-btn:active {
            transform: translateY(0);
        }
        
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        
        .message.error {
            background: #fee;
            color: #c33;
            display: block;
            border: 1px solid #fcc;
        }
        
        .message.success {
            background: #efe;
            color: #3c3;
            display: block;
            border: 1px solid #cfc;
        }
        
        .spinner {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner.show {
            display: block;
        }
        
        .authorization-banner {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .authorization-banner.show {
            display: block;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .restricted {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        
        .restricted.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <h1>👤 Register Admin</h1>
            <p>Hitaishi Building Materials</p>
        </div>
        
        <div class="authorization-banner" id="authBanner" style="display: none;">
            ℹ️ Only existing admins can register new admin accounts
        </div>
        
        <div class="restricted" id="restricted" style="display: none;">
            🔒 Access Denied: You must be logged in as an admin to register new admins.
            <br><br>
            <a href="https://buildmarts.in/admin_login.html" style="color: #721c24;">← Back to Admin Login</a>
        </div>
        
        <form id="adminRegisterForm">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter full name" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="admin@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="1234567890">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter a strong password" required>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
            </div>
            
            <div class="spinner" id="spinner">
                <p>⏳ Registering admin...</p>
            </div>
            
            <div class="message" id="message"></div>
            
            <button type="submit" class="register-btn">Register New Admin</button>
        </form>
        
        <div class="login-link">
            <a href="https://buildmarts.in/admin_login.html">← Back to Admin Login</a>
        </div>
    </div>
    
    <script>
        // Handle form submission
        document.getElementById('adminRegisterForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            const spinner = document.getElementById('spinner');
            
            // Reset message
            messageDiv.textContent = '';
            messageDiv.className = 'message';
            spinner.classList.remove('show');
            
            // Validation
            if (!name || !email || !password || !confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Name, email, and password are required';
                return;
            }
            
            if (password !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Passwords do not match';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Password must be at least 6 characters';
                return;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Please enter a valid email address';
                return;
            }
            
            try {
                spinner.classList.add('show');
                
                const response = await fetch('https://buildmarts.in/api/admin/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        name, 
                        email, 
                        password, 
                        phone: phone || null
                    })
                });
                
                const data = await response.json();
                spinner.classList.remove('show');
                
                if (response.status === 403) {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = 'Access Denied: You must be logged in as an admin to register new admins';
                    return;
                }
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Admin registered successfully! Redirecting to dashboard...';
                    
                    // Reset form
                    document.getElementById('adminRegisterForm').reset();
                    
                    // Redirect to dashboard after 1.5 seconds
                    setTimeout(() => {
                        window.location.href = 'https://buildmarts.in/admin_dashboard.html';
                    }, 1500);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message || 'Registration failed';
                }
            } catch (error) {
                spinner.classList.remove('show');
                console.error('Error:', error);
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Server error. Please try again.';
            }
        });
    </script>
</body>
</html>
