
<!-- Chatbot Float Button (Right Bottom) -->
<button id="chatbot-open-btn" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  background: linear-gradient(135deg, #2863e8 0%, #1e5cc4 100%);
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 24px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(40, 99, 232, 0.4);
  transition: all 0.3s ease;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
" title="Chat with us">💬</button>

<!-- Chatbot Modal Overlay -->
<div id="chatbot-modal-overlay" style="
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 9998;
"></div>

<!-- Chatbot Modal Container -->
<div id="chatbot-modal" style="
  position: fixed;
  bottom: 85px;
  right: 20px;
  width: 380px;
  height: 550px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 5px 40px rgba(0,0,0,0.3);
  display: none;
  flex-direction: column;
  z-index: 9999;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
">
  <!-- Header -->
  <div style="
    background: linear-gradient(135deg, #2863e8 0%, #1e5cc4 100%);
    color: white;
    padding: 16px;
    border-radius: 12px 12px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 600;
    font-size: 15px;
  ">
    <span><span style="margin-right: 8px;">💬</span>BuildMarts Chat</span>
    <button id="chatbot-close-btn" style="
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      cursor: pointer;
      font-size: 20px;
      width: 28px;
      height: 28px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    ">×</button>
  </div>

  <!-- Messages -->
  <div id="chatbot-msgs" style="
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    background: #f9fafb;
  ">
    <div style="padding: 10px; text-align: center; color: #999; font-size: 12px;">
      👋 Hi! Ask about cement, bricks, steel or any materials!
    </div>
  </div>

  <!-- Input -->
  <div style="
    display: flex;
    padding: 12px;
    gap: 8px;
    border-top: 1px solid #e5e7eb;
    background: white;
  ">
    <input 
      type="text" 
      id="chatbot-txt-input" 
      style="
        flex: 1;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        outline: none;
        font-family: inherit;
      "
      placeholder="Type message..."
      autocomplete="off"
    />
    <button id="chatbot-send-btn" style="
      padding: 10px 15px;
      background: #2863e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: background 0.2s ease;
    ">Send</button>
  </div>
</div>

<style>
  #chatbot-msgs::-webkit-scrollbar {
    width: 5px;
  }
  #chatbot-msgs::-webkit-scrollbar-track {
    background: #f1f1f1;
  }
  #chatbot-msgs::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 3px;
  }
  #chatbot-msgs::-webkit-scrollbar-thumb:hover {
    background: #555;
  }

  .chatbot-message {
    margin-bottom: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.4;
    word-wrap: break-word;
    animation: chatMsgSlide 0.3s ease-out;
  }

  @keyframes chatMsgSlide {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .chatbot-message.user {
    background: #e8f3ff;
    color: #0066cc;
    margin-left: 25px;
    text-align: right;
    border-bottom-right-radius: 2px;
  }

  .chatbot-message.bot {
    background: #f0f1f3;
    color: #19222d;
    margin-right: 25px;
    border-bottom-left-radius: 2px;
  }

  #chatbot-open-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(40, 99, 232, 0.6);
  }

  #chatbot-open-btn:active {
    transform: scale(0.95);
  }

  @media (max-width: 480px) {
    #chatbot-modal {
      width: calc(100vw - 20px) !important;
      height: 70vh !important;
      max-height: 550px !important;
      bottom: 70px !important;
      right: 10px !important;
    }

    .chatbot-message.user {
      margin-left: 15px;
    }

    .chatbot-message.bot {
      margin-right: 15px;
    }
  }
</style>

<script>
  // Chatbot Keywords Database
  const chatbotDB = {
         "hi": "Hello, How are you?",
            "hello": "Hi, How are you?",
            "how are you": "I'm just a bot, but I'm doing great! How about you?",
            "good morning": "Good morning! Have a fantastic day ahead!",
            "good night": "Good night! Sweet dreams!",
            "thank you": "You're welcome! 😊",
            "what's your name": "I'm your friendly chatbot!",
            "who created you": "I was created by Naveen Teja! 😉",
            "who is your master": "My Master is Nagaraju. He holds root access to my system.",
            "bye": "Goodbye! Have a great day!",
            "what can you do": "I can chat with you! Ask me anything. 😊",
    'cement|cement price|opc|ppc': 'Cement: OPC & PPC brands from ₹370-₹420/bag. Ask for details!',
    'bricks|brick price|red brick|fly ash': 'We supply fly ash & clay bricks. Ask "brick price" for estimates!',
    'steel|tmt|tmt bars|fe500|fe550': 'TMT bars in Fe500 & Fe550 grades. Ask "steel price" for rates!',
    'sand|m-sand|river sand': 'River sand & M-sand available. Ask "sand price per ton"!',
    'plumbing|pipe|pvc|tank|fitting': 'PVC pipes & CP fittings available. Ask "pipe price"!',
    'cement price|cement cost|cement rate|cement availability|opc|ppc': 'Cement price may vary. We recommend OPC and PPC brands from ₹370 to ₹420 per bag. Ask for specific brand details.',
    'bricks|brick|brick price|brick cost|brick rate|red brick|fly ash brick|clay brick': 'Bricks types include fly ash and clay. Ask "brick price" or "brick quantity for 100 sqft" for detailed help.',
    'steel|tmt|tmt bars|steel price|steel cost|fe500|fe550|steel rods|tmtbars': 'We provide TMT steel bars in various grades like Fe500 and Fe550. Ask "steel price today" for latest rates.',
    'sand|m-sand|river sand|sand price|msand|river sand price': 'Sand types include river sand and M-sand. Ask "sand price per ton" for details.',
    'aggregates|aggregate|20mm|40mm|aggregate price': 'Aggregates include 20mm and 40mm sizes used for concrete. Ask for price and delivery options.',
    'electrical|wire|switch|fitting|electrical items': 'We supply electrical items like wires, switches, and fittings. Ask "wire price" or "switch brands".',
    'plumbing|pipe|tank|fitting|pvc|water tank|cp fitting': 'Plumbing materials include PVC pipes, CP fittings, and tanks. Ask "pipe price" or "water tank details".',
    'stock|availability|available|out of stock': 'Stock availability depends on your selected category. You can specify a product name like "TMT bars" or "red bricks".',
    'pricing|price|cost|rate|how much': 'Pricing varies by product and location. Provide a product name for an accurate estimate like "sand price" or "steel rate".',
    'discount|offer|deal|bulk discount': 'We offer bulk order discounts. Tell us your quantity to get the best price.',
    'services|interior|design|construction|contractor|service|renovation': 'BuildMarts offers complete solutions including material supply, interior services, and bulk order management.',
    'supplier|builder|registration|dashboard|account': 'Registered users can access their dashboard to track orders, manage materials, and view updates. Sign up or log in for more features.',
    'delivery|shipping|order|tracking|track order|delivery time': 'We provide safe and timely delivery of materials directly to your site. Orders can be tracked via your dashboard after confirmation.',
    'location|support|contact|phone|email|helpline': 'You can contact us through phone, WhatsApp, or website form for quick assistance. Share your city for accurate availability and pricing.',
    'help|how to|what is|where can i|guide|tutorial': 'You can ask about products, prices, services, suppliers, or delivery. Example: "cement price", "interior services", "bulk order".',
    'warranty|quality|quality assurance|guarantee': 'All our products are quality-assured and come with proper certifications. We guarantee authentic building materials.',
    'payment|return|refund|exchange|money back': 'We accept multiple payment methods. Returns and refunds are processed within 7 days. Please check our refund policy for details.',
    'thanks|thank you|appreciate|grateful': 'You\'re welcome! If you need anything else, feel free to ask. We\'re always here to help! 😊'
  };

  // DOM Elements
  const openBtn = document.getElementById('chatbot-open-btn');
  const closeBtn = document.getElementById('chatbot-close-btn');
  const modal = document.getElementById('chatbot-modal');
  const overlay = document.getElementById('chatbot-modal-overlay');
  const msgsDiv = document.getElementById('chatbot-msgs');
  const inputTxt = document.getElementById('chatbot-txt-input');
  const sendBtn = document.getElementById('chatbot-send-btn');

  // Open chatbot
  function openChat() {
    modal.style.display = 'flex';
    overlay.style.display = 'block';
    inputTxt.focus();
  }

  // Close chatbot
  function closeChat() {
    modal.style.display = 'none';
    overlay.style.display = 'none';
  }

  // Add message
  function addMsg(text, isUser) {
    const msg = document.createElement('div');
    msg.className = `chatbot-message ${isUser ? 'user' : 'bot'}`;
    msg.textContent = text;
    msgsDiv.appendChild(msg);
    msgsDiv.scrollTop = msgsDiv.scrollHeight;
  }

  // Find response
  function getResponse(userMsg) {
    const normalized = userMsg.trim().toLowerCase();
    for (const [keys, response] of Object.entries(chatbotDB)) {
      const keywordList = keys.split('|');
      if (keywordList.some(kw => normalized.includes(kw.trim()))) {
        return response;
      }
    }
    return "I'm not sure how to respond to that. Can you try something else?";
  }

  // Send message
  async function sendMsg() {
    const msg = inputTxt.value.trim();
    if (!msg) return;

    inputTxt.value = '';
    addMsg(msg, true);

    await new Promise(r => setTimeout(r, 500));
    addMsg(getResponse(msg), false);
  }

  // Event Listeners
  openBtn.addEventListener('click', openChat);
  closeBtn.addEventListener('click', closeChat);
  overlay.addEventListener('click', closeChat);
  sendBtn.addEventListener('click', sendMsg);
  inputTxt.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      sendMsg();
    }
  });

  // Close with Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.style.display === 'flex') {
      closeChat();
    }
  });

  // Hover effect for button
  openBtn.addEventListener('mouseover', () => {
    openBtn.style.transform = 'scale(1.1)';
    openBtn.style.boxShadow = '0 6px 20px rgba(40, 99, 232, 0.6)';
  });

  openBtn.addEventListener('mouseout', () => {
    openBtn.style.transform = 'scale(1)';
    openBtn.style.boxShadow = '0 4px 12px rgba(40, 99, 232, 0.4)';
  });
</script>
