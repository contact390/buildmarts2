<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
</head>
<body>
    <h2>Test Login</h2>
    <input type="email" id="email" placeholder="Email" value="seller@test.com"><br>
    <input type="password" id="password" placeholder="Password" value="password"><br>
    <button onclick="testLogin()">Login as Seller</button>
    
    <script>
    async function testLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const res = await fetch('https://buildmarts.in/api/login', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                identifier: email,
                password: password,
                userType: 'seller'
            })
        });
        
        const data = await res.json();
        console.log('Login response:', data);
        
        if (data.success) {
            alert('Login successful!');
            // Store in localStorage
            localStorage.setItem('userSession', JSON.stringify({
                id: data.user.id,
                name: data.user.name,
                email: data.user.email,
                userType: 'seller'
            }));
            window.location.href = 'seller_orders.html';
        } else {
            alert('Login failed: ' + data.message);
        }
    }
    </script>
</body>
</html>
