<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>buildmarts.in · Sellers & Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f4f7fb;
            color: #1a4a5f;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a4a5f;
            margin-bottom: 10px;
        }
        .header p {
            color: #4a6f8c;
            font-size: 1.1rem;
        }
        .sellers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .seller-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }
        .seller-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .seller-name {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1a4a5f;
            margin-bottom: 10px;
        }
        .seller-info {
            color: #4a6f8c;
            margin-bottom: 5px;
            font-size: 0.95rem;
        }
        .seller-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e2eaf2;
        }
        .stat {
            text-align: center;
        }
        .stat-number {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f4b740;
        }
        .stat-label {
            font-size: 0.85rem;
            color: #6f8da3;
            margin-top: 2px;
        }
        .products-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .products-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .products-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1a4a5f;
        }
        .back-btn {
            background: #e2eaf2;
            color: #4a6f8c;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .back-btn:hover {
            background: #d1e0f0;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .product-card {
            background: #f8fafc;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #e2eaf2;
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-2px);
        }
        .product-image {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a4a5f;
            margin-bottom: 8px;
        }
        .product-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #f4b740;
            margin-bottom: 5px;
        }
        .product-category {
            color: #6f8da3;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .product-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #6f8da3;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #6f8da3;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #fcc;
        }
        .no-products {
            text-align: center;
            padding: 50px;
            color: #6f8da3;
        }
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .header {
                padding: 20px;
            }
            .header h1 {
                font-size: 2rem;
            }
            .sellers-grid {
                grid-template-columns: 1fr;
            }
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <div id="navbar-container"></div>

    <div class="container">
        <div class="header">
            <h1 id="page-title">All Sellers</h1>
            <p id="page-subtitle">Browse our registered sellers and their products</p>
        </div>

        <!-- Sellers List -->
        <div id="sellers-section">
            <div class="loading">Loading sellers...</div>
        </div>

        <!-- Products Section (shown only when seller selected) -->
        <div id="products-section" style="display: none;">
            <div class="products-section">
                <div class="products-header">
                    <h2 class="products-title" id="products-title">Seller Products</h2>
                    <button class="back-btn" onclick="showSellersList()">← Back to Sellers</button>
                </div>
                <div id="products-content">
                    <div class="loading">Loading products...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <script>
        // Load navbar
        async function loadNavbar() {
            try {
                const response = await fetch('navbar.html');
                const html = await response.text();
                document.getElementById('navbar-container').innerHTML = html;
                console.log('Navbar loaded successfully');
            } catch (error) {
                console.error('Failed to load navbar:', error);
                // Continue without navbar
            }
        }

        // Load footer
        async function loadFooter() {
            try {
                const response = await fetch('footer.html');
                const html = await response.text();
                document.getElementById('footer-placeholder').innerHTML = html;
                console.log('Footer loaded successfully');
            } catch (error) {
                console.error('Failed to load footer:', error);
                // Continue without footer
            }
        }

        // Get URL parameters
        function getUrlParameter(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // API base (backend server).
        // If you're running the frontend via live-server or another host,
        // this ensures API requests always go to port 5000.
        const API_BASE = 'http://localhost:5000';

        // Get current logged-in seller ID from localStorage session
        function getCurrentSellerId() {
            try {
                const sessionRaw = localStorage.getItem('userSession');
                if (!sessionRaw) return null;
                const session = JSON.parse(sessionRaw);
                return session.id || session.userId || session.seller_id || null;
            } catch (e) {
                console.warn('Unable to parse userSession from storage', e);
                return null;
            }
        }

        // Attempt to populate session from server if not already in localStorage
        async function syncSession() {
            let userSession = localStorage.getItem('userSession');
            if (!userSession) {
                try {
                    const res = await fetch(`${API_BASE}/api/me`, { method: 'GET', credentials: 'include' });
                    const result = await res.json();
                    if (result.success && result.user) {
                        const u = result.user;
                        const info = {
                            id: u.id,
                            userId: u.id,
                            name: u.name,
                            email: u.email,
                            userType: u.userType,
                                   loginTime: new Date().toISOString()
                        };
                        localStorage.setItem('userSession', JSON.stringify(info));
                        localStorage.setItem('isLoggedIn', 'true');
                        userSession = JSON.stringify(info);
                        console.log('Session synced from server:', info);
                    }
                } catch (err) {
                    console.warn('Could not sync session from server', err);
                }
            }
            return userSession;
        }

        // Load all sellers
        async function loadSellers() {
            console.log('Loading sellers...');
            const urls = [
                '/api/seller-profile',
                'https://buildmarts.in/api/seller-profile',
                'http://127.0.0.1:5000/api/seller-profile'
            ];
            
            for (const url of urls) {
                try {
                    console.log('Trying URL:', url);
                    const response = await fetch(url);
                    console.log('Response status:', response.status);
                    
                    if (!response.ok) {
                        console.log('Response not ok, trying next URL');
                        continue;
                    }
                    
                    const data = await response.json();
                    console.log('API response:', data);

                    if (data.success) {
                        displaySellers(data.sellers);
                        return; // Success, exit function
                    } else {
                        document.getElementById('sellers-section').innerHTML =
                            '<div class="error">Failed to load sellers: ' + (data.message || 'Unknown error') + '</div>';
                        return;
                    }
                } catch (error) {
                    console.error(`Error with URL ${url}:`, error);
                    // Try next URL
                }
            }
            
            // All URLs failed
            document.getElementById('sellers-section').innerHTML =
                '<div class="error">Error loading sellers: All connection attempts failed. Please check if the server is running on port 5000.</div>';
        }

        // Display sellers list
        function displaySellers(sellers) {
            if (!sellers || sellers.length === 0) {
                document.getElementById('sellers-section').innerHTML =
                    '<div class="no-products">No sellers found</div>';
                return;
            }

            const sellersHtml = sellers.map(seller => `
                <div class="seller-card" onclick="loadSellerProducts(${seller.id}, '${seller.name}')">
                    <div class="seller-name">${seller.name}</div>
                    <div class="seller-info">📧 ${seller.email}</div>
                    <div class="seller-info">📱 ${seller.phone || 'N/A'}</div>
                    <div class="seller-info">🏢 ${seller.company || 'N/A'}</div>
                    <div class="seller-info">📍 ${seller.address}</div>
                    <div class="seller-stats">
                        <div class="stat">
                            <div class="stat-number" id="products-count-${seller.id}">...</div>
                            <div class="stat-label">Products</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${seller.gst ? '✓' : '✗'}</div>
                            <div class="stat-label">GST</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${new Date(seller.created_at).getFullYear()}</div>
                            <div class="stat-label">Joined</div>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('sellers-section').innerHTML = `<div class="sellers-grid">${sellersHtml}</div>`;

            // Load product counts for each seller
            sellers.forEach(seller => loadSellerProductCount(seller.id));

            // If a seller is logged in, auto-open their products view
            const currentSellerId = getCurrentSellerId();
            console.log('Current seller ID from session:', currentSellerId);
            if (currentSellerId) {
                const seller = sellers.find(s => s.id == currentSellerId);
                if (seller) {
                    console.log('Auto-opening products for seller:', seller.name);
                    loadSellerProducts(currentSellerId, seller.name);
                } else {
                    console.log('Logged-in seller not found in sellers list');
                }
            } else {
                console.log('No seller logged in, showing all sellers');
                // Add a login prompt for sellers
                const loginPrompt = document.createElement('div');
                loginPrompt.style.cssText = `
                    background: #e8f4fd;
                    border: 1px solid #1e88e5;
                    border-radius: 10px;
                    padding: 15px;
                    margin: 20px 0;
                    text-align: center;
                    color: #0d47a1;
                `;
                loginPrompt.innerHTML = `
                    <strong>👋 Sellers:</strong> <a href="login.html" style="color: #1565c0; text-decoration: underline;">Log in</a> 
                    to automatically view your products and get real-time updates when you upload new items.
                `;
                document.getElementById('sellers-section').appendChild(loginPrompt);
            }
        }

        // Load product count for a seller
        async function loadSellerProductCount(sellerId) {
            try {
                const response = await fetch(`${API_BASE}/api/product_uploads/seller/${sellerId}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById(`products-count-${sellerId}`).textContent = data.total;
                } else {
                    document.getElementById(`products-count-${sellerId}`).textContent = '0';
                }
            } catch (error) {
                console.error(`Error loading product count for seller ${sellerId}:`, error);
                document.getElementById(`products-count-${sellerId}`).textContent = '0';
            }
        }

        // Load products for a specific seller
        async function loadSellerProducts(sellerId, sellerName) {
            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('seller', sellerId);
            window.history.pushState({}, '', url);

            // Update page title
            document.getElementById('page-title').textContent = `${sellerName}'s Products`;
            document.getElementById('page-subtitle').textContent = `Browse all products from ${sellerName}`;
            document.getElementById('products-title').textContent = `${sellerName}'s Products`;

            // Show products section, hide sellers
            document.getElementById('sellers-section').style.display = 'none';
            document.getElementById('products-section').style.display = 'block';

            // Load products
            document.getElementById('products-content').innerHTML = '<div class="loading">Loading products...</div>';

            try {
                const response = await fetch(`${API_BASE}/api/product_uploads/seller/${sellerId}`);
                const data = await response.json();

                if (data.success) {
                    displayProducts(data.products);
                } else {
                    document.getElementById('products-content').innerHTML =
                        '<div class="error">Failed to load products</div>';
                }
            } catch (error) {
                console.error('Error loading products:', error);
                document.getElementById('products-content').innerHTML =
                    '<div class="error">Error loading products</div>';
            }
        }

        // Display products
        function displayProducts(products) {
            if (!products || products.length === 0) {
                document.getElementById('products-content').innerHTML =
                    '<div class="no-products">No products found for this seller</div>';
                return;
            }

            const productsHtml = products.map(product => `
                <div class="product-card">
                    ${product.imageUrl ? `<img src="${product.imageUrl}" alt="${product.productName}" class="product-image">` : '<div class="product-image" style="background: #e2eaf2; display: flex; align-items: center; justify-content: center; color: #6f8da3;">📷 No Image</div>'}
                    <div class="product-name">${product.productName}</div>
                    <div class="product-price">₹${product.finalPrice || product.price}</div>
                    <div class="product-category">${product.category}</div>
                    <div class="product-meta">
                        <span>Qty: ${product.quantity} ${product.quantityUnit || ''}</span>
                        <span>MOQ: ${product.moq}</span>
                    </div>
                </div>
            `).join('');

            document.getElementById('products-content').innerHTML = `<div class="products-grid">${productsHtml}</div>`;
        }

        // Show sellers list
        function showSellersList() {
            // Update URL
            const url = new URL(window.location);
            url.searchParams.delete('seller');
            window.history.pushState({}, '', url);

            // Update page title
            document.getElementById('page-title').textContent = 'All Sellers';
            document.getElementById('page-subtitle').textContent = 'Browse our registered sellers and their products';

            // Show sellers, hide products
            document.getElementById('sellers-section').style.display = 'block';
            document.getElementById('products-section').style.display = 'none';
        }

        // Initialize page
        async function init() {
            console.log('Initializing page...');

            // Test basic connectivity
            try {
                const testResponse = await fetch('/');
                console.log('Basic connectivity test:', testResponse.status);
            } catch (testError) {
                console.error('Basic connectivity test failed:', testError);
            }

            await loadNavbar();
            await loadFooter();

            // Sync session from server if needed
            await syncSession();

            const sellerId = getUrlParameter('seller');
            if (sellerId) {
                // Load specific seller's products
                try {
                    // First get seller info
                    const sellersResponse = await fetch('/api/seller-profile');
                    const sellersData = await sellersResponse.json();

                    if (sellersData.success) {
                        const seller = sellersData.sellers.find(s => s.id == sellerId);
                        if (seller) {
                            loadSellerProducts(sellerId, seller.name);
                        } else {
                            // Seller not found, show all sellers
                            loadSellers();
                        }
                    } else {
                        loadSellers();
                    }
                } catch (error) {
                    loadSellers();
                }
            } else {
                // Show all sellers
                loadSellers();
            }
        }

        // Listen for updates from other tabs (e.g., product upload page)
        window.addEventListener('storage', (event) => {
            if (event.key === 'sellerProductsUpdated') {
                const updatedSellerId = event.newValue;
                const currentSellerId = getCurrentSellerId();

                // If the currently viewed seller matches, refresh their products.
                if (updatedSellerId && currentSellerId && updatedSellerId === String(currentSellerId)) {
                    const sellerId = currentSellerId;
                    const sellerName = document.getElementById('page-title').textContent.replace("'s Products", '');
                    loadSellerProducts(sellerId, sellerName);
                }

                // Refresh product counts for all sellers
                // (keeps count badges up to date after upload)
                const sellerCards = document.querySelectorAll('.seller-card');
                sellerCards.forEach(card => {
                    const onclick = card.getAttribute('onclick') || '';
                    const match = onclick.match(/loadSellerProducts\((\d+)/);
                    if (match) {
                        loadSellerProductCount(match[1]);
                    }
                });
            }
        });

        // Start the application
        init();
    </script>

</body>
</html>
