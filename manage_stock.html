<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Stock - Seller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 12px 15px; border: 1px solid #ddd; text-align: left; }
        th { background: #667eea; color: #fff; }
        img { max-width: 60px; max-height: 60px; object-fit: cover; }
        .qty-input { width: 60px; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-update { background: #28a745; color: #fff; }
        .btn-update:hover { background: #218838; }
        .alert { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; }
        .alert.success { background: #d4edda; color: #155724; }
        .alert.error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
  <div class="container">
    <h1>Manage Stock</h1>
    <div id="alert" class="alert"></div>
    <table id="stockTable">
      <thead>
        <tr>
          <th>Image</th>
          <th>Name</th>
          <th>Current Qty</th>
          <th>New Qty</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    async function syncSession() {
      let userSession = localStorage.getItem('userSession');
      if (!userSession) {
        try {
          const res = await fetch('http://localhost:5000/api/me', { credentials: 'include' });
          const result = await res.json();
          if (result.success && result.user) {
            const u = result.user;
            const info = {
              id: u.id,
              userId: u.id,
              name: u.name,
              email: u.email,
              userType: u.userType,
              loginTime: new Date().toISOString()
            };
            localStorage.setItem('userSession', JSON.stringify(info));
            localStorage.setItem('isLoggedIn', 'true');
            userSession = JSON.stringify(info);
          }
        } catch (e) {
          console.warn('session sync failed', e);
        }
      }
      return userSession;
    }

    async function checkAuth() {
      const sess = await syncSession();
      if (!sess) {
        alert('Please login first');
        window.location.href = 'login.html';
        return null;
      }
      const user = JSON.parse(sess);
      if (user.userType !== 'seller') {
        alert('Only sellers can access this page');
        window.location.href = 'login.html';
        return null;
      }
      return user.id || user.userId;
    }

    function showAlert(msg, type='success') {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = 'alert ' + type;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 3000);
    }

    async function fetchProducts(sellerId) {
      try {
        const res = await fetch(`http://localhost:5000/api/product_uploads/seller/${sellerId}`, { credentials: 'include' });
        const data = await res.json();
        if (data.success) {
          populateTable(data.products);
        }
      } catch (e) {
        console.error(e);
      }
    }

    function populateTable(products) {
      const tbody = document.querySelector('#stockTable tbody');
      tbody.innerHTML = '';
      products.forEach(p => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.imageUrl ? `<img src="${p.imageUrl}" alt="">` : ''}</td>
          <td>${p.productName}</td>
          <td>${p.quantity || 0}</td>
          <td><input type="number" min="0" value="${p.quantity||0}" class="qty-input" id="qty-${p.id}"></td>
          <td><button class="btn btn-update" onclick="updateQty(${p.id})">Update</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    async function updateQty(productId) {
      const input = document.getElementById(`qty-${productId}`);
      const qty = parseInt(input.value);
      if (isNaN(qty) || qty < 0) { showAlert('Invalid quantity', 'error'); return; }
      try {
        const res = await fetch(`http://localhost:5000/api/product_uploads/${productId}/quantity`, {
          method: 'PUT',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quantity: qty })
        });
        const data = await res.json();
        if (data.success) {
          showAlert('Quantity updated');
        } else {
          showAlert(data.message || 'Update failed', 'error');
        }
      } catch (e) {
        console.error(e);
        showAlert('Network error', 'error');
      }
    }

    window.addEventListener('load', async () => {
      const sellerId = await checkAuth();
      if (sellerId) fetchProducts(sellerId);
    });
  </script>
</body>
</html>
