<!DOCTYPE html>
<html>
<head>
<title>Admin - Users</title>
<style>
.sidebar { width:220px; background:#1e293b; color:white; height:100vh; padding:20px; position:fixed; top:0; left:0; bottom:0; box-shadow:2px 0 5px rgba(0,0,0,0.1); z-index:999; overflow-y:auto; }
.sidebar h2 { margin-bottom:20px; font-size:24px; text-align:center; color:#f8f9fa; }
.nav-btn { display:block; width:100%; text-align:left; padding:12px 14px; margin-bottom:10px; border-radius:8px; cursor:pointer; transition:background .25s ease, transform .2s ease; font-weight:600; border:none; color:white; font-size:16px; }
.nav-btn:hover { transform:scale(1.01); box-shadow:0 4px 8px rgba(0,0,0,0.2); }
.nav-dashboard { background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.nav-products { background:linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
.nav-orders { background:linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
.nav-users { background:linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
.nav-contacts { background:linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
.nav-active { box-shadow:0 0 15px rgba(255,255,255,0.3); transform:scale(1.05); }
.main-content { margin-left:240px; padding:24px; min-height:100vh; background:#f4f6fb; }
.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.section-header h1 { margin:0; color:#1e2f58; font-size:28px; }
.btn-primary { background:#0f62ff; color:#fff; border:none; border-radius:8px; padding:10px 16px; cursor:pointer; font-weight:700; box-shadow:0 3px 10px rgba(15,98,255,0.25); }
.btn-primary:hover { transform:translateY(-1px); }
.table-container { background:#fff; border-radius:14px; box-shadow:0 3px 15px rgba(17,24,39,0.08); border:1px solid #e6ebf4; overflow:hidden; }
.data-table { width:100%; border-collapse:collapse; }
.data-table th, .data-table td { padding:12px 14px; border-bottom:1px solid #edf2f8; }
.data-table th { background:#f3f6fd; color:#0f2f5c; font-weight:700; }
.data-table tbody tr:hover { background:#f7f9ff; }
.action-btn { padding:6px 10px; border:none; border-radius:8px; color:#fff; font-weight:700; cursor:pointer; }
.btn-delete { background:#e02020; }
.btn-delete:hover { background:#c41010; }
</style>
</head>

<body style="margin:0;font-family:Arial;display:flex;background:#f1f5f9;">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>BuildMarts</h2>
<button class="nav-btn nav-dashboard nav-active" onclick="location.href='admin_dashboard.html'">📊 Dashboard</button>

<button class="nav-btn nav-products" onclick="location.href='admin-products.html'">📦 Products</button>
<button class="nav-btn nav-orders" onclick="location.href='admin-orders.html'">🛒 Orders</button>
<button class="nav-btn nav-users nav-active" onclick="location.href='admin-users.html'">👥 Users</button>
<button class="nav-btn nav-contacts" onclick="location.href='admin-contacts.html'">📬 Contacts</button>
</div>

<!-- CONTENT -->
<div class="main-content">

<h1>Users Management</h1>

<button onclick="loadBuyers()">Buyers</button>
<button onclick="loadSellers()">Sellers</button>

<br><br>

<table border="1" width="100%" style="background:white;border-collapse:collapse;">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="userTable"></tbody>
</table>

</div>

<!-- POPUP -->
<div id="popup" style="display:none;position:fixed;top:0;width:100%;height:100%;background:rgba(0,0,0,0.5);">
<div style="background:white;width:400px;margin:100px auto;padding:20px;">
<h3>User Details</h3>
<div id="popupData"></div>
<button onclick="closePopup()">Close</button>
</div>
</div>

<script>

let currentUsers = [];
let currentType = 'buyer';

// LOAD BUYERS
function loadBuyers() {
currentType = 'buyer';

fetch('http://localhost:5000/api/buyer-profile')
.then(res => res.json())
.then(data => {
  currentUsers = data.buyers;
  renderUsers();
});
}

// LOAD SELLERS
function loadSellers() {
currentType = 'seller';

fetch('http://localhost:5000/api/seller-profile')
.then(res => res.json())
.then(data => {
  currentUsers = data.sellers;
  renderUsers();
});
}

// RENDER USERS
function renderUsers() {

let html = '';

currentUsers.forEach(u => {

html += `
<tr>
<td>${u.id}</td>
<td>${u.name}</td>
<td>${u.email}</td>
<td>${u.phone || '-'}</td>
<td>${u.status || 'active'}</td>

<td>
<button onclick="viewUser(${u.id})">View</button>

${currentType === 'seller' && u.status !== 'approved' ? 
`<button onclick="approveSeller(${u.id})">Approve</button>` : ''}

<button onclick="blockUser(${u.id})" style="background:red;color:white;">Block</button>
</td>
</tr>
`;

});

document.getElementById("userTable").innerHTML = html;
}

// VIEW USER
function viewUser(id) {
const user = currentUsers.find(u => u.id === id);

let html = `
<p><b>Name:</b> ${user.name}</p>
<p><b>Email:</b> ${user.email}</p>
<p><b>Phone:</b> ${user.phone}</p>
<p><b>Address:</b> ${user.address}</p>
`;

if (currentType === 'seller') {
html += `<p><b>Company:</b> ${user.company}</p>
<p><b>GST:</b> ${user.gst}</p>`;
}

document.getElementById("popupData").innerHTML = html;
document.getElementById("popup").style.display = "block";
}

// CLOSE POPUP
function closePopup() {
document.getElementById("popup").style.display = "none";
}

// APPROVE SELLER
function approveSeller(id) {
fetch(`http://localhost:5000/api/approve-seller/${id}`, {
method: 'PUT'
})
.then(() => {
alert("Seller Approved");
loadSellers();
});
}

// BLOCK USER
function blockUser(id) {
fetch(`http://localhost:5000/api/block-user/${currentType}/${id}`, {
method: 'PUT'
})
.then(() => {
alert("User Blocked");
currentType === 'buyer' ? loadBuyers() : loadSellers();
});
}

// DEFAULT LOAD
loadBuyers();

</script>

</body>
</html>
